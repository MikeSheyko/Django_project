{% extends "layout.html" %}

{% block content %}

<h1>Product List Page!</h1>

<!-- 🔥 CAROUSEL -->
<div id="shopCarousel" class="carousel slide mb-4" data-bs-ride="carousel">

  <div class="carousel-inner rounded">

    <div class="carousel-item active">
      <img src="https://picsum.photos/1200/400?random=1"
           class="d-block w-100"
           alt="Slide 1">
    </div>

    <div class="carousel-item">
      <img src="https://picsum.photos/1200/400?random=2"
           class="d-block w-100"
           alt="Slide 2">
    </div>

    <div class="carousel-item">
      <img src="https://picsum.photos/1200/400?random=3"
           class="d-block w-100"
           alt="Slide 3">
    </div>

  </div>

  <!-- controls -->
  <button class="carousel-control-prev" type="button"
          data-bs-target="#shopCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button"
          data-bs-target="#shopCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
<!-- 🔥 END CAROUSEL -->

<!-- PRODUCTS -->
<div class="row row-cols-1 row-cols-md-3 g-4">

  {% for product in products %}
  <div class="col">
    <div class="card h-100">

      <img src="{{ product.image }}"
           class="card-img-top"
           alt="{{ product.name }}" />

      <div class="card-body">
        <a href="{% url 'product_detail' product.id %}"
           class="stretched-link"></a>

        <h5 class="card-title">{{ product.name }}</h5>
        <p class="card-text">
          {{ product.price }}$ - {{ product.category }}
        </p>

      </div>
    </div>
  </div>
  {% endfor %}

</div>

{% endblock %}
