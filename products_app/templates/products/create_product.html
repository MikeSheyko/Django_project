{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="mb-4">
            <i class="bi bi-plus-circle-fill"></i>
            Create Product
        </h2>
        <form
            method="POST"
            enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            <button
                class="btn btn-success">
                <i class="bi bi-check-circle-fill"></i>
                Create
            </button>
            <a
                href="{% url 'admin_panel' %}"
                class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
